id: medium
title: Auth service degradation with noisy downstream failures
difficulty: medium
description: Investigate intermittent login and request failures across the platform. Multiple downstream symptoms are visible, including gateway 401s, user-service retry storms, and noisy authentication errors, but auth-service is the true root cause. The agent must look past the misleading symptom surface, identify auth-service as the real fault domain, restart the affected service, communicate truthfully, and restore platform health.
initial_conditions:
  root_cause_service: auth-service
  initial_health: 0.40
  correct_fix: restart_service
success_criteria:
  - root_cause_found == true
  - correct_fix_applied == true
  - truthful_status_posted == true
  - resolved == true
reward_range:
  min: 0.0
  max: 1.0
