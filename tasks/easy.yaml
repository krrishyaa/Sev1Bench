id: easy
title: API service out-of-memory incident
difficulty: easy
description: Investigate a straightforward checkout outage caused by a single failing service. The api-service is the true root cause, the logs are direct, and the correct operator response is to identify the failure quickly, apply rollback, communicate truthfully, and restore service health.
initial_conditions:
  root_cause_service: api-service
  initial_health: 0.55
  correct_fix: rollback
success_criteria:
  - root_cause_found == true
  - correct_fix_applied == true
  - truthful_status_posted == true
  - resolved == true
reward_range:
  min: 0.0
  max: 1.0
